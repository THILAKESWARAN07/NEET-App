name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target environment
        required: true
        type: choice
        options:
          - development
          - staging
          - production
  push:
    branches:
      - develop
      - staging
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - name: Resolve target
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "develop" ]; then
            echo "target=development" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "target=staging" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
          else
            echo "target=development" >> "$GITHUB_OUTPUT"
          fi

  release-check:
    runs-on: ubuntu-latest
    needs: prepare
    defaults:
      run:
        working-directory: backend
    env:
      ENVIRONMENT: ${{ needs.prepare.outputs.target }}
      DATABASE_URL: sqlite:///./deploy_check.db
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      VERIFY_GOOGLE_TOKEN: ${{ secrets.VERIFY_GOOGLE_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run release checks
        run: python scripts/release_check.py

  build-image:
    runs-on: ubuntu-latest
    needs: [prepare, release-check]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: neet-backend:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [prepare, build-image]
    environment: ${{ needs.prepare.outputs.target }}
    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      GCP_REGION: ${{ secrets.GCP_REGION }}
      GCP_ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}
      CLOUD_RUN_SERVICE: ${{ secrets.CLOUD_RUN_SERVICE }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
      VERIFY_GOOGLE_TOKEN: ${{ secrets.VERIFY_GOOGLE_TOKEN }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPO}/neet-backend:${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          gcloud builds submit ./backend --tag "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "${IMAGE}" \
            --region "${GCP_REGION}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ENVIRONMENT=${{ needs.prepare.outputs.target }}" \
            --set-env-vars "DATABASE_URL=${DATABASE_URL}" \
            --set-env-vars "SECRET_KEY=${SECRET_KEY}" \
            --set-env-vars "ALLOWED_ORIGINS=${ALLOWED_ORIGINS}" \
            --set-env-vars "VERIFY_GOOGLE_TOKEN=${VERIFY_GOOGLE_TOKEN}" \
            --set-env-vars "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}" \
            --set-env-vars "OPENAI_API_KEY=${OPENAI_API_KEY}" \
            --set-env-vars "OPENAI_MODEL=${OPENAI_MODEL}"

      - name: Verify deployment health
        run: |
          URL=$(gcloud run services describe "${CLOUD_RUN_SERVICE}" --region "${GCP_REGION}" --format='value(status.url)')
          echo "Service URL: $URL"
          curl -fsS "$URL/health"
          curl -fsS "$URL/ready"
